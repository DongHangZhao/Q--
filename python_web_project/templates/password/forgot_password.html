{% extends "base.html" %} {% block title %}忘记密码 - 咫尺天涯{% endblock %} {%
block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-warning text-dark">
          <h4 class="mb-0"><i class="fas fa-unlock-alt"></i> 忘记密码</h4>
        </div>
        <div class="card-body">
          <div class="alert alert-info">
            <i class="fas fa-info-circle"></i>
            <strong>找回密码流程：</strong><br />
            1. 输入您的用户名或邮箱<br />
            2. 完成验证码验证<br />
            3. 系统会生成重置码<br />
            4. 联系管理员获取重置码<br />
            5. 使用重置码设置新密码
          </div>

          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label class="form-label">
                <i class="fas fa-user"></i> 用户名或邮箱
              </label>
              <input
                type="text"
                class="form-control"
                id="username_or_email"
                name="username_or_email"
                placeholder="请输入用户名或邮箱"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">
                <i class="fas fa-shield-alt"></i> 验证码
              </label>
              <div class="row">
                <div class="col-6">
                  <input
                    type="text"
                    class="form-control"
                    id="captcha"
                    name="captcha"
                    placeholder="请输入验证码"
                    required
                    maxlength="6"
                  />
                </div>
                <div class="col-6">
                  <img
                    id="captchaImage"
                    src="/captcha"
                    alt="验证码"
                    class="img-fluid"
                    style="cursor: pointer; height: 38px"
                    onclick="refreshCaptcha()"
                    title="点击刷新验证码"
                  />
                </div>
              </div>
            </div>

            <div id="alertMessage"></div>

            <div class="d-grid">
              <button type="submit" class="btn btn-warning">
                <i class="fas fa-paper-plane"></i> 提交重置请求
              </button>
            </div>
          </form>

          <hr />
          <div class="text-center">
            <a href="/login" class="text-muted">
              <i class="fas fa-arrow-left"></i> 返回登录
            </a>
            <span class="mx-2">|</span>
            <a href="/password/verify-code" class="text-muted">
              <i class="fas fa-check"></i> 输入重置码
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function refreshCaptcha() {
    document.getElementById("captchaImage").src = "/captcha?" + Date.now();
  }

  document
    .getElementById("forgotPasswordForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);

      try {
        const response = await fetch("/password/forgot-password", {
          method: "POST",
          body: formData,
        });

        const result = await response.json();

        if (result.success) {
          showAlert("success", result.message + "，即将跳转到验证页面...");
          setTimeout(() => {
            window.location.href = "/password/verify-code";
          }, 2000);
        } else {
          showAlert("danger", result.message);
          refreshCaptcha();
        }
      } catch (error) {
        showAlert("danger", "网络错误，请稍后重试");
        refreshCaptcha();
      }
    });

  function showAlert(type, message) {
    const alertDiv = document.getElementById("alertMessage");
    alertDiv.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            <i class="fas fa-${type === "success" ? "check-circle" : "exclamation-triangle"}"></i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
  }
</script>

<style>
  .card {
    border-radius: 15px;
    overflow: hidden;
  }
  .card-header {
    border-radius: 15px 15px 0 0 !important;
  }
  .form-control:focus {
    border-color: #ffc107;
    box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
  }
</style>

{% endblock %}
