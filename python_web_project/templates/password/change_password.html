{% extends "base.html" %} {% block title %}修改密码 - 咫尺天涯{% endblock %} {%
block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="fas fa-key"></i> 修改密码</h4>
        </div>
        <div class="card-body">
          <form id="changePasswordForm">
            <div class="mb-3">
              <label class="form-label">
                <i class="fas fa-lock"></i> 旧密码
              </label>
              <input
                type="password"
                class="form-control"
                id="old_password"
                name="old_password"
                placeholder="请输入旧密码"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label">
                <i class="fas fa-key"></i> 新密码
              </label>
              <input
                type="password"
                class="form-control"
                id="new_password"
                name="new_password"
                placeholder="请输入新密码（至少6位）"
                required
                minlength="6"
              />
              <small class="text-muted">密码长度不能少于6位</small>
            </div>
            <div class="mb-3">
              <label class="form-label">
                <i class="fas fa-check-circle"></i> 确认新密码
              </label>
              <input
                type="password"
                class="form-control"
                id="confirm_password"
                name="confirm_password"
                placeholder="请再次输入新密码"
                required
                minlength="6"
              />
            </div>
            <div id="alertMessage"></div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 修改密码
              </button>
            </div>
          </form>
          <hr />
          <div class="text-center">
            <a href="/password/forgot-password" class="text-muted">
              <i class="fas fa-question-circle"></i> 忘记密码？
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document
    .getElementById("changePasswordForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("new_password").value;
      const confirmPassword = document.getElementById("confirm_password").value;

      // 验证密码一致性
      if (newPassword !== confirmPassword) {
        showAlert("danger", "两次输入的密码不一致");
        return;
      }

      const formData = new FormData(e.target);

      try {
        const response = await fetch("/password/change-password", {
          method: "POST",
          body: formData,
        });

        const result = await response.json();

        if (result.success) {
          showAlert("success", result.message + "，即将跳转到登录页...");
          setTimeout(() => {
            window.location.href = "/logout";
          }, 2000);
        } else {
          showAlert("danger", result.message);
        }
      } catch (error) {
        showAlert("danger", "网络错误，请稍后重试");
      }
    });

  function showAlert(type, message) {
    const alertDiv = document.getElementById("alertMessage");
    alertDiv.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            <i class="fas fa-${type === "success" ? "check-circle" : "exclamation-triangle"}"></i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `;
  }
</script>

<style>
  .card {
    border-radius: 15px;
    overflow: hidden;
  }
  .card-header {
    border-radius: 15px 15px 0 0 !important;
  }
  .form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
  }
</style>

{% endblock %}
